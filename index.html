<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Massage · Concept Mockups for Review</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
  :root{--primary:#1A3626;--primary-light:#B5C9B3;--gold:#D4B872;--dark:#12221A;--light:#F4F7F4;--gray:#5A6B62;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  html,body{height:100%;}
  body{display:flex;flex-direction:column;background:#e7ede9;color:var(--dark);}

  header{background:var(--primary);color:#fff;padding:.7rem 1.2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.15);z-index:5;}
  .brand{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:.5rem;white-space:nowrap;}
  .brand i{color:var(--gold);}
  .brand small{font-weight:400;color:var(--primary-light);font-size:.78rem;margin-left:.3rem;}

  .tabs{display:flex;gap:.4rem;flex-wrap:wrap;flex:1;}
  .tab{background:rgba(255,255,255,.08);color:#dfe8e2;border:1px solid transparent;padding:.5rem .85rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;}
  .tab:hover{background:rgba(255,255,255,.16);color:#fff;}
  .tab.active{background:var(--gold);color:var(--primary);border-color:var(--gold);}
  .tab .kind{display:inline-block;font-size:.62rem;letter-spacing:.5px;text-transform:uppercase;opacity:.7;margin-left:.35rem;}

  .controls{display:flex;gap:.4rem;align-items:center;}
  .seg{display:flex;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;}
  .seg button{background:none;border:none;color:#dfe8e2;padding:.5rem .7rem;cursor:pointer;font-size:.85rem;}
  .seg button.active{background:#fff;color:var(--primary);}
  .newtab{color:#dfe8e2;font-size:.82rem;text-decoration:none;padding:.5rem .6rem;border-radius:8px;}
  .newtab:hover{background:rgba(255,255,255,.12);color:#fff;}

  .note{background:#fbf6ea;color:#6b5a2b;font-size:.82rem;padding:.5rem 1.2rem;border-bottom:1px solid #ecdfbf;text-align:center;}
  .note b{color:#5a4a1f;}

  .stage{flex:1;display:flex;justify-content:center;align-items:flex-start;overflow:auto;padding:1.2rem;}
  .frame-wrap{background:#fff;border-radius:14px;box-shadow:0 18px 50px rgba(26,54,38,.22);overflow:hidden;width:100%;max-width:1280px;height:100%;transition:max-width .3s ease;}
  .frame-wrap.mobile{max-width:400px;border-radius:30px;border:8px solid #1d2a23;}
  iframe{width:100%;height:100%;border:none;display:block;background:#fff;}

  @media(max-width:680px){.brand small{display:none;}.controls .newtab{display:none;}}
</style>
</head>
<body>
  <header>
    <div class="brand"><i class="fa-solid fa-leaf"></i> Vida Massage <small>practice site concepts</small></div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-src="v2-1-serene-sidebar.html">Serene Sidebar<span class="kind">Recommended</span></button>
      <button class="tab" data-src="v2-2-warm-boutique.html">Warm Boutique</button>
      <button class="tab" data-src="v2-3-editorial-premium.html">Editorial</button>
      <button class="tab" data-src="v2-5-classic-centered.html">Classic</button>
      <button class="tab" data-src="v2-4-minimal-booking.html">Minimal<span class="kind">Mobile / link-in-bio</span></button>
    </div>
    <div class="controls">
      <div class="seg" id="seg">
        <button class="active" data-mode="desktop"><i class="fa-solid fa-desktop"></i></button>
        <button data-mode="mobile"><i class="fa-solid fa-mobile-screen"></i></button>
      </div>
      <a class="newtab" id="newtab" href="v2-1-serene-sidebar.html" target="_blank" rel="noopener"><i class="fa-solid fa-up-right-from-square"></i> Open</a>
    </div>
  </header>

  <div class="note">Hi Vivian! Five directions for your studio site, all inspired by the sites you liked. <b>Serene Sidebar</b> is our top pick. <b>Minimal</b> is a phone-friendly page for your Instagram link. Use the screen icons to preview mobile.</div>

  <div class="stage">
    <div class="frame-wrap" id="wrap">
      <iframe id="viewer" src="v2-1-serene-sidebar.html" title="Mockup preview"></iframe>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const viewer = document.getElementById('viewer');
    const newtab = document.getElementById('newtab');
    const wrap = document.getElementById('wrap');
    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const src = t.getAttribute('data-src');
      viewer.src = src; newtab.href = src;
    }));
    document.querySelectorAll('#seg button').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('#seg button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      wrap.classList.toggle('mobile', b.getAttribute('data-mode') === 'mobile');
    }));
  </script>
</body>
</html>
